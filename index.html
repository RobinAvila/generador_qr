<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR Personalizado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #4CAF50;
        }

        .color-pickers {
            display: flex;
            gap: 15px;
        }

        .color-group {
            flex: 1;
        }

        /* Estilizado simple para los selectores de color nativos */
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #45a049;
        }

        #qrcode-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #qrcode {
            padding: 15px;
            background-color: transparent; /* El fondo lo maneja la librería interna */
            border-radius: 8px;
            display: inline-block;
        }

        /* Ocultar el botón de descarga hasta que haya un QR generado */
        #download-btn {
            background-color: #008CBA;
            margin-top: 15px;
            display: none;
        }
        #download-btn:hover {
            background-color: #007B9A;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Generador de QR</h2>
    
    <div class="form-group">
        <label for="link">URL:</label>
        <input type="text" id="link" placeholder="https://drive.google.com/..." value="https://drive.google.com">
    </div>

    <div class="form-group color-pickers">
        <div class="color-group">
            <label for="fgColor">Color del QR:</label>
            <input type="color" id="fgColor" value="#000000">
        </div>
        <div class="color-group">
            <label for="bgColor">Color de Fondo:</label>
            <input type="color" id="bgColor" value="#e1e9d1">
        </div>
    </div>

    <button onclick="generarQR()">Generar Código QR</button>

    <div id="qrcode-container">
        <div id="qrcode"></div>
        <button id="download-btn" onclick="descargarQR()">Descargar QR (PNG)</button>
    </div>
</div>

<script>
    let qrInstancia = null;

    function generarQR() {
        const link = document.getElementById('link').value.trim();
        const colorQR = document.getElementById('fgColor').value;
        const colorFondo = document.getElementById('bgColor').value;
        const contenedorQR = document.getElementById('qrcode');
        const botonDescarga = document.getElementById('download-btn');

        if (link === "") {
            alert("Por favor, ingresa un enlace válido.");
            return;
        }

        // Limpiar el QR anterior si existe
        contenedorQR.innerHTML = "";

        // Creamos el nuevo código QR utilizando la librería
        qrInstancia = new QRCode(contenedorQR, {
            text: link,
            width: 256,
            height: 256,
            colorDark: colorQR,      // Color de los módulos (el QR en sí)
            colorLight: colorFondo,  // Color del fondo
            correctLevel: QRCode.CorrectLevel.H // Alto nivel de corrección (ideal si los colores tienen poco contraste)
        });

        // Mostramos el botón de descarga con un pequeño delay para asegurar que el elemento se renderizó
        setTimeout(() => {
            botonDescarga.style.display = "block";
        }, 100);
    }

    function descargarQR() {
        // La librería genera una etiqueta <img> dentro del contenedor. Buscamos esa imagen.
        const img = document.querySelector('#qrcode img');
        
        if (img) {
            const enlaceDescarga = document.createElement('a');
            enlaceDescarga.href = img.src;
            enlaceDescarga.download = 'codigo_qr_personalizado.png';
            document.body.appendChild(enlaceDescarga);
            enlaceDescarga.click();
            document.body.removeChild(enlaceDescarga);
        } else {
            alert("Hubo un problema al intentar descargar la imagen.");
        }
    }
</script>

</body>
</html>
